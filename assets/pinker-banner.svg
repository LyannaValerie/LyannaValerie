<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Lyanna Valerie — Pinker</title>
  <desc id="desc">Banner técnico rosa com circuitos, pipeline de compilação e identidade Pinker.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100c13"/>
      <stop offset="0.5" stop-color="#1c111d"/>
      <stop offset="1" stop-color="#2c1023"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4fa3"/>
      <stop offset="0.5" stop-color="#ff8bc6"/>
      <stop offset="1" stop-color="#d7448f"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#ff73b8" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>

  <g opacity=".55" stroke="#ff4fa3" fill="none" stroke-width="2">
    <path d="M0 76 H150 L190 116 H315"/>
    <path d="M0 286 H120 L170 236 H305"/>
    <path d="M1200 66 H1060 L1010 116 H880"/>
    <path d="M1200 294 H1080 L1020 234 H880"/>
    <circle cx="150" cy="76" r="5" fill="#ff4fa3"/>
    <circle cx="170" cy="236" r="5" fill="#ff4fa3"/>
    <circle cx="1060" cy="66" r="5" fill="#ff4fa3"/>
    <circle cx="1020" cy="234" r="5" fill="#ff4fa3"/>
  </g>

  <g transform="translate(86 103)" filter="url(#glow)">
    <path d="M58 0 C94 0 116 24 116 57 C116 94 88 116 58 116 C24 116 0 91 0 58 C0 25 23 0 58 0Z"
          fill="none" stroke="url(#pink)" stroke-width="5"/>
    <path d="M33 84 V31 H63 C84 31 95 42 95 58 C95 75 83 84 63 84 H50"
          fill="none" stroke="#ffd1e7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="33" cy="84" r="5" fill="#ff4fa3"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="245" y="142" fill="#fff4f9" font-size="50" font-weight="700" letter-spacing="2">LYANNA VALERIE</text>
    <text x="248" y="184" fill="#ff73b8" font-size="21" letter-spacing="4">PINKER · COMPILADORES · RUNTIMES · SISTEMAS</text>

    <g transform="translate(248 230)" font-size="15">
      <rect x="0" y="0" width="126" height="42" rx="9" fill="#2d1728" stroke="#ff4fa3" stroke-opacity=".6"/>
      <text x="20" y="27" fill="#ffd1e7">fonte .pink</text>
      <path d="M137 21 H173" stroke="#ff73b8" stroke-width="2"/>
      <path d="M166 14 L175 21 L166 28" fill="none" stroke="#ff73b8" stroke-width="2"/>

      <rect x="184" y="0" width="93" height="42" rx="9" fill="#2d1728" stroke="#ff4fa3" stroke-opacity=".6"/>
      <text x="210" y="27" fill="#ffd1e7">AST</text>
      <path d="M288 21 H324" stroke="#ff73b8" stroke-width="2"/>
      <path d="M317 14 L326 21 L317 28" fill="none" stroke="#ff73b8" stroke-width="2"/>

      <rect x="337" y="0" width="93" height="42" rx="9" fill="#2d1728" stroke="#ff4fa3" stroke-opacity=".6"/>
      <text x="366" y="27" fill="#ffd1e7">IR</text>
      <path d="M441 21 H477" stroke="#ff73b8" stroke-width="2"/>
      <path d="M470 14 L479 21 L470 28" fill="none" stroke="#ff73b8" stroke-width="2"/>

      <rect x="490" y="0" width="136" height="42" rx="9" fill="#2d1728" stroke="#ff4fa3" stroke-opacity=".6"/>
      <text x="509" y="27" fill="#ffd1e7">x86-64 / ELF</text>
    </g>
  </g>

  <text x="1120" y="326" text-anchor="end" fill="#ff8bc6" opacity=".72"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    do bit ao sistema
  </text>
</svg>
